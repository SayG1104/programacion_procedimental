<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <title>Contabilidad</title>
  </head>
  <body>
    <div class="box">
      <div class="box">Contabilidad</div>
      <div class="box">
        <figure class="image is-128x128">
          <img
            class="is-rounded"
            src="https://cdn-icons-png.flaticon.com/128/10233/10233997.png"
          />
        </figure>
        <form class="box">
          <div class="field">
            <label class="label">Ventas</label>
            <div class="control">
              <input class="input" type="number" />
            </div>
          </div>

          <div class="field">
            <label class="label">Fecha</label>
            <div class="control">
              <input class="input" type="date" />
            </div>
          </div>

          <div class="field">
            <label class="label">Ingresos</label>
            <div class="control">
              <input class="input" type="number" />
            </div>
          </div>

          <div class="field">
            <label class="label">Egresos</label>
            <div class="control">
              <input class="input" type="number" />
            </div>
          </div>

          <div class="field">
            <label class="label">Concepto</label>
            <div class="control">
              <input class="input" type="text" />
            </div>
          </div>

          <div class="field">
            <label class="label">Valor</label>
            <div class="control">
              <input class="input" type="number" />
            </div>
          </div>

          <button class="button is-danger is-light">Enviar</button>
        </form>
      </div>
    </div>
    <button 
  type="button" 
  class="button is-primary"
  onclick="window.location.href='../index.html'">
  Regresar
</button>
  </body>
</html>
