
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="../css/style.css"/>
    <title>Inventario</title>
</head>
<body>
   
  <div class="field">
    <label class="label">Código producto</label>
    <div class="control">
      <input class="input" type="text" id="codigo_producto"/>
    </div>
  </div>

  <div class="field">
    <label class="label">Nombre producto</label>
    <div class="control">
      <input class="input" type="text" id="nombre_producto"/>
    </div>
  </div>

  <div class="field">
    <label class="label">Cantidad</label>
    <div class="control">
      <input class="input" type="text" id="cantidad"/>
    </div>
  </div>

  <div class="field">
    <label class="label">Marca producto</label>
    <div class="control">
      <input class="input" type="text" id="marca_producto"/>
    </div>
  </div>

  <button class="button is-primary" id="guardar">Guardar</button>
   <button class="button is-primary">Cancelar</button>
<button 
  type="button" 
  class="button is-primary"
  onclick="window.location.href='../index.html'">
  Regresar
</button>
 <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/inventario.js"></script>
</body>
</html>
