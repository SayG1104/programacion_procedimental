
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <title>Usuario</title>
</head>
<body>
   <div class="field">
  <label class="label">Nombre</label>
  <div class="control">
    <input class="input" type="text" id="nombre">
  </div>
</div>

<div class="field">
  <label class="label">Apellido</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-success" type="text" id="apellido">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
</div>

<div class="field">
  <label class="label">Tipo de documento</label>
  <div class="control">
    <div class="select">
      <select id="tipo_documento">
        <option>Tarjeta identidad</option>
        <option>Cédula ciudadania</option>
        <option>Cédula extranjería</option>
      </select>
    </div>
  </div>
</div>

<div class="field">
  <label class="label">Número de Documento</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-danger" type="tel" id="numero_documento">
    <span class="icon is-small is-left">
      <i class="fas fa-envelope"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-exclamation-triangle"></i>
    </span>
  </div>
</div>

<div class="field">
  <label class="label">Teléfono</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-danger" type="tel" id="telefono">
    <span class="icon is-small is-left">
      <i class="fas fa-envelope"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-exclamation-triangle"></i>
    </span>
  </div>
</div>

<div class="field">
  <label class="label">Correo electrónico</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-danger" type="email" id="correo_electronico">
    <span class="icon is-small is-left">
      <i class="fas fa-envelope"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-exclamation-triangle"></i>
    </span>
  </div>
</div>

<div class="field">
  <label class="label">Género</label>
  <div class="control">
    <div class="select">
      <select id="genero">
        <option>Femenino</option>
        <option>Masculino</option>
      </select>
    </div>
  </div>
</div>

<div class="field">
  <label class="label">Cargo</label>
  <div class="control">
    <div class="select">
      <select id="cargo">
        <option>Estudiante</option>
        <option>Empleado</option>
        <option>Ama de casa</option>
        <option>Desempleado</option>
        <option>Jubilado</option>
      </select>
    </div>
  </div>
</div>

<div class="field">
  <label class="label">Fecha de Nacimiento</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-success" type="date" id="fecha_nacimiento">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
</div>

<div class="field">
  <label class="label">Contraseña</label>
  <div class="control has-icons-left has-icons-right">
    <input class="input is-success" type="password" id="contraseña">
    <span class="icon is-small is-left">
      <i class="fas fa-user"></i>
    </span>
    <span class="icon is-small is-right">
      <i class="fas fa-check"></i>
    </span>
  </div>
</div>

<div class="field is-grouped">
  <div class="control">
    <button class="button is-link" id="Guardar">Guardar</button>
  </div>
  
    <div class="control">
    <button class="button is-link is-light" id="Cancelar">Cancelar</button>
  </div>
</div>
<button 
  type="button" 
  class="button is-primary"
  onclick="window.location.href='../index.html'">
  Regresar
</button>
<script src="../js/usuario.js"></script>
</body>
</html>
