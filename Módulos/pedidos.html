<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <title>Pedidos</title>
</head>
    <style>
      body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      field {
        width: 200%;
        max-width: 800px;
        margin-bottom: 2rem;
      }
    </style>
    <title>Inventario</title>
</head>
<body>
    <form class="box">
  <div class="field">
    <label class="label">Producto</label>
    <div class="control">
      <input class="input" type="text" id="producto"/>
    </div>
  </div>

  <div class="field">
    <label class="label">Dirección</label>
    <div class="control">
      <input class="input" type="text" id="direccion"/>
    </div>
  </div>

  <div class="field">
    <label class="label">Nombre del usuario</label>
    <div class="control">
      <input class="input" type="text" id="nombre_usuario"/>
    </div>
  </div>

  <div class="field">
    <label class="label">Cantidad</label>
    <div class="control">
      <input class="input" type="number" id="cantidad"/>
    </div>
  </div>

  <div class="field">
    <label class="label">Método de pago</label>
    <div class="select">
  <select id ="metodo_pago">
    <option>Débito</option>
    <option>Crédito</option>
    <option>Nequi</option>
  </select>
</div>
  </div>

  <div class="field">
    <label class="label">Teléfono</label>
    <div class="control">
      <input class="input" type="text" id="telefono"/>
    </div>
  </div>

  <button class="button is-primary">Enviar</button>
   <button class="button is-primary">Cancelar</button>
</form>
<button 
  type="button" 
  class="button is-primary"
  onclick="window.location.href='../index.html'">
  Regresar
</button>
<script src="../js/pedidos.js"></script>
</body>
</html>
