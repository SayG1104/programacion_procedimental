
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"/>
    <link rel="stylesheet" href="../css/style.css"/>
    <title>Pedidos e Inventario</title>
</head>
<body>
    
  <div class="field">
    <label class="label">Producto</label>
    <div class="control">
      <input class="input" type="text" id="producto"/>
    </div>
  </div>

  <div class="field">
    <label class="label">Dirección</label>
    <div class="control">
      <input class="input" type="text" id="direccion" />
    </div>
  </div>

  <div class="field">
    <label class="label">Nombre del usuario</label>
    <div class="control">
      <input class="input" type="text" id="nombre_usuario"/>
    </div>
  </div>

  <div class="field">
    <label class="label">Cantidad</label>
    <div class="control">
      <input class="input" type="number" id="cantidad"/>
    </div>
  </div>

  <div class="field">
    <label class="label">Método de pago</label>
    <div class="select is-fullwidth">
      <select id="metodo_pago">
        <option value="">Seleccione un método...</option>
        <option value="Debito">Débito</option>
        <option value="Credito">Crédito</option>
        <option value="Nequi">Nequi</option>
      </select>
    </div>
  </div>

  <div class="field">
    <label class="label">Teléfono</label>
    <div class="control">
      <input class="input" type="text" id="telefono"/>
    </div>
  </div>

  <div class="buttons">
    <button class="button is-primary" id="guardar">Guardar</button>
    <button class="button is-light">Cancelar</button>
    <button type="button" class="button is-link" onclick="window.location.href='../index.html'">
      Regresar
    </button>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/pedidos.js"></script>
</body>
</html>
